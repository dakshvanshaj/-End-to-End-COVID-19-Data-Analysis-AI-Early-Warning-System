services:
    # Service 1: The Database
    db:
        image: postgres:18.1
        container_name: ds-postgres
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        ports:
            - "${DB_PORT}:5432"
        volumes:
            - pg_data:/var/lib/postgresql

    # Service 2: The UI (pgAdmin)
    pgadmin:
        image: dpage/pgadmin4:9.11
        container_name: ds-pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "5050:80"
        volumes:
            - pgadmin_data:/var/lib/pgadmin 
        depends_on:
            - db

    # Service 3: Automation (n8n)
    n8n:
        image: docker.n8n.io/n8nio/n8n
        container_name: ds-n8n
        restart: always
        ports:
            - "5678:5678"
        environment:
            - N8N_HOST=localhost
            - N8N_PORT=5678
            - N8N_PROTOCOL=http
            - NODE_ENV=production
            - WEBHOOK_URL=http://localhost:5678/
            - GENERIC_TIMEZONE=Asia/Kolkata
        volumes:
            - n8n_data:/home/node/.n8n
        depends_on:
            - db

    # Service 4: The Dashboard (Streamlit UI)
    app:
        build: .
        container_name: ds-dashboard
        ports:
            - "8501:8501"
        environment:
            - DB_HOST=${DB_HOST}
            - DB_PORT=${DB_PORT}
            - DB_USER=${DB_USER}
            - DB_PASSWORD=${DB_PASSWORD}
            - DB_NAME=${DB_NAME}
        entrypoint: ["./entrypoint.sh"]
        command: ["streamlit", "run", "src/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
        depends_on:
            - db

volumes:
    pg_data:
        name: data_stack_pg_data
    pgadmin_data:
        name: data_stack_pgadmin_data
    n8n_data:
        name: n8n_data
